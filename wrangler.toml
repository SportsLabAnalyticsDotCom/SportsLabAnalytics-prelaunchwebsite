name = "sportslab"
main = "index.js"
compatibility_date = "2024-01-01"

[vars]
# Add any public variables here (don't add secrets)

# Secrets should be added via wrangler secret put:
# wrangler secret put SUPABASE_URL
# wrangler secret put SUPABASE_ANON_KEY

[[kv_namespaces]]
# Add if you need KV storage

[site]
bucket = "./"
include = ["index.html", "images/*", "articles/*"]
exclude = ["node_modules", "*.md", "*.docx", "server.py", "start.sh", "*.litcoffee", ".DS_Store"]
